<html>
<head>
    <style>
        body{
            background-color: darkslategray;
	    overflow: hidden;
        }
        .btn{
            color: black;
            border: 0;
            height: 100%;
            width: 49%;
            margin: 0;
        }
        .cont{
            height: 18%;
            margin: 4px;
        }
        .sidepanel  {
            width: 0;
            position: fixed;
            z-index: 1;
            height: 100%;
            top: 0;
            left: 0;
            background-color: #111;
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
        }

        #sidepanela {
            padding: 8px 8px 200px 500px;
            text-decoration: none;
            font-size: 150px;
            color: #818181;
            display: block;
            transition: 0.3s;
        }

        #sidepanela:hover {
            color: #f1f1f1;
            cursor: pointer;
        }

        .sidepanel button {
            padding: 8px 8px 8px 32px;
            text-decoration: none;
            font-size: 72px;
            color: #818181;
            display: block;
            transition: 0.3s;
            background-color: inherit;
            border: 0;
        }

        .sidepanel button:hover {
            color: #f1f1f1;
            cursor: pointer;
        }
        .sidepanel p {
            padding: 8px 8px 8px 32px;
            text-decoration: none;
            font-size: 15px;
            color: #818181;
            display: block;
            transition: 0.3s;
        }

        .sidepanel .closebtn {
            position: absolute;
            top: 0;
            right: 25px;
        }

        .openbtn {
            font-size: 72px;
            cursor: pointer;
            background-color: #111;
            color: white;
            padding: 40px 60px;
            border: none;
            position: absolute;
            left: 0;
            top: 0;
            border-bottom-right-radius: 10px;
        }

        .openbtn:hover {
            background-color:#444;
        }
        #panelbuttons{
            position: absolute;
            top: 25%
        }
    </style>
</head>
<body>
    <div id="mySidepanel" class="sidepanel">
        <a href="javascript:void(0)" id ="sidepanela" class="closebtn" onclick="closeNav()">×</a>
        <div id="panelbuttons">
            <a style="text-decoration: none;" href="./"><button>Refresh</button></a>
            <form action = "/res" method = "POST">
                <button name = "mode" value="loop">Solbrille Boiii
                    {% if name %} 
                        {% if name['loop']=="True" %}
                            (On)
                        {% endif %}
                        {% if name['loop']=="False" %}
                            (Off)
                        {% endif %}
                    {% endif %}
                </button>
            </form>
        </div>
        <p style="position: absolute; bottom: 10%;">Laget av Dagens Lindeman</p>
    </div>
    
    <button class="openbtn" onclick="openNav()">☰</button>  
    
    <script>
    function openNav() {
    document.getElementById("mySidepanel").style.width = "50%";
    }
    
    function closeNav() {
    document.getElementById("mySidepanel").style.width = "0";
    }
    </script>

    
    <form class = "grid" action = "/res" method = "POST">
        <div class = "cont" style="position: absolute; width: 100%; top: 0; left: 25%;">
                <button
                {% if name %} 
                    {% if name['rød1']=="True" %}
                        style="background-color: red;"
                    {% endif %}
                    {% if name['rød1']=="False" %}
                        style="background-color: darkred;"
                    {% endif %}
                {% endif %}
                class = "btn" name="lys" value="1">Rød 1</button> 
        </div>
        <div class = "cont" style="position: absolute; width: 100%; top: 19%; left: 25%;">
                <button  
                {% if name %} 
                    {% if name['rød2']=="True" %}
                        style="background-color: red;"
                    {% endif %}
                    {% if name['rød2']=="False" %}
                        style="background-color: darkred;"
                    {% endif %}
                {% endif %}
                class = "btn" name="lys" value="2">Rød 2</button>   
        </div>
        <div class = "cont" style="position: absolute; width: 100%; top: 38%; left: 25%;">
                <button  
                {% if name %} 
                    {% if name['grønn']=="True" %}
                        style="background-color: lightgreen;"
                    {% endif %}
                    {% if name['grønn']=="False" %}
                        style="background-color: darkgreen;"
                    {% endif %}
                {% endif %}
                class = "btn" name="lys" value="3">Grønn</button> 
        </div>
        <div class = "cont" style="position: absolute; width: 100%; top: 57%; left: .5%;">
                <button class = "btn" name="lys" value="4">Grønn Mann</button>
                <button class = "btn" name="lys" value="5">Rød Mann</button> 
        </div>
        <div class = "cont" style="position: absolute; width: 100%; top: 76%; left: .5%;">
                <button class = "btn" name="lys" value="6">Alle av</button>
                <button class = "btn" name="lys" value="7">Alle På</button> 
        </div>
    </form>
    
    
</body>

</html>
